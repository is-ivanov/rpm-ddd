services:
  - type: web
    name: rpm-ddd
    runtime: image
    plan: free
    region: frankfurt
    image:
      url: ghcr.io/is-ivanov/rpm-ddd:latest
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: RPM_IAM_ACTIVATION_JWT_SECRET
        sync: false
      - key: JAVA_OPTS
        value: "-Xmx384m -XX:+UseG1GC -XX:MaxMetaspaceSize=128m"
      - key: PORT
        value: "10000"
