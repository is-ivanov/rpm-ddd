# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "frontend/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "Dockerfile"
      - ".github/workflows/build.yml"
      - "code-quality-config/**"
      - "package.json"
      - "package-lock.json"
      - "allurerc.mjs"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "frontend/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "Dockerfile"
      - ".github/workflows/build.yml"
      - "code-quality-config/**"
      - "package.json"
      - "package-lock.json"
      - "allurerc.mjs"

# Pages deployment needs write access to Pages and an OIDC token; checkout needs read.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Shared-first Postgres for DB-tagged tests: DbContainerTestExecutionListener
    # probes localhost:54034 and reuses this service instead of cold-starting a
    # Testcontainer (image pull + ryuk + boot) on every run. Creds/port/db match
    # docker/infra-tests.yml so the listener's "Local db server found" path fires.
    # Each CI run is an isolated ephemeral VM, so this service is per-run private —
    # no cross-PR sharing. Postgres perf flags (fsync=off, …) are not set: GitHub
    # service containers cannot override the container command.
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rpm_ddd
        ports:
          - 54034:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn verify -B -Pfrontend

    # Report generation moved to the `allure-report` job so backend + vitest
    # results (here) can be merged with Playwright results from `frontend-e2e`.
    - name: Upload Allure results
      if: always() && github.actor != 'dependabot[bot]'
      uses: actions/upload-artifact@v7
      with:
        name: allure-results-build
        path: target/allure-results
        retention-days: 1

    - name: Upload coverage to Codecov
      if: always() && github.actor != 'dependabot[bot]'
      uses: codecov/codecov-action@v6
      with:
        files: target/site/jacoco/jacoco.xml
        fail_ci_if_error: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload JAR artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: app-jar
        path: target/*.jar
        retention-days: 1

#    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
#    - name: Update dependency graph
#      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  # Runs the Playwright e2e suite in parallel with `build` (no dependency: the
  # frontend-only stack needs neither the app jar nor Postgres). Playwright's
  # webServer config boots vite itself. Emits Allure results, uploaded as an
  # artifact that the `allure-report` job merges into the unified report.
  frontend-e2e:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.13.0'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright e2e
      run: npm run test:e2e
    - name: Upload e2e Allure results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: allure-results-e2e
        path: target/allure-results
        retention-days: 1

  # Merges Allure results from `build` (backend + vitest) and `frontend-e2e`
  # (Playwright) into one unified report. Runs even if upstream tests failed so
  # the report always reflects the latest run.
  allure-report:
    needs: [build, frontend-e2e]
    if: always() && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        cache: npm
    - name: Download build Allure results
      uses: actions/download-artifact@v8
      with:
        name: allure-results-build
        path: target/allure-results
    - name: Download e2e Allure results
      uses: actions/download-artifact@v8
      with:
        name: allure-results-e2e
        path: target/allure-results
    - name: Generate Allure report
      run: |
        npm ci
        npm run report
    - name: Upload Allure report
      uses: actions/upload-artifact@v7
      with:
        name: allure-report
        path: target/allure-report
        retention-days: 7

  # Publishes the Allure report to GitHub Pages. Runs only on main (incl. manual
  # dispatch) and even if tests failed, so the web report always reflects the latest run.
  deploy-report:
    needs: allure-report
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download Allure report
      uses: actions/download-artifact@v8
      with:
        name: allure-report
        path: allure-report
    - name: Setup Pages
      uses: actions/configure-pages@v6
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: allure-report
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
