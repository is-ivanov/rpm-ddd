# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "Dockerfile"
      - ".github/workflows/build.yml"
      - "code-quality-config/**"
      - "package.json"
      - "package-lock.json"
      - "allurerc.mjs"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "Dockerfile"
      - ".github/workflows/build.yml"
      - "code-quality-config/**"
      - "package.json"
      - "package-lock.json"
      - "allurerc.mjs"

# Pages deployment needs write access to Pages and an OIDC token; checkout needs read.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn verify -B

    - name: Set up Node.js
      if: always() && github.actor != 'dependabot[bot]'
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: npm

    - name: Generate Allure report
      if: always() && github.actor != 'dependabot[bot]'
      run: |
        npm ci
        npm run report

    - name: Upload Allure report
      if: always() && github.actor != 'dependabot[bot]'
      uses: actions/upload-artifact@v7
      with:
        name: allure-report
        path: target/allure-report
        retention-days: 7

    - name: Upload coverage to Codecov
      if: always() && github.actor != 'dependabot[bot]'
      uses: codecov/codecov-action@v6
      with:
        files: target/site/jacoco/jacoco.xml
        fail_ci_if_error: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload JAR artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: app-jar
        path: target/*.jar
        retention-days: 1

#    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
#    - name: Update dependency graph
#      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  # Publishes the Allure report to GitHub Pages. Runs only on main (incl. manual
  # dispatch) and even if tests failed, so the web report always reflects the latest run.
  deploy-report:
    needs: build
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download Allure report
      uses: actions/download-artifact@v7
      with:
        name: allure-report
        path: allure-report
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: allure-report
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
