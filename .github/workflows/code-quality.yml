name: Run Code Quality Tools

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "code-quality-config/**"
      - "frontend/**"
      - ".github/workflows/code-quality.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "code-quality-config/**"
      - "frontend/**"
      - ".github/workflows/code-quality.yml"

jobs:

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache Checkstyle cache-file
        id: cache-checkstyle
        uses: actions/cache@v6
        with:
          path: target/checkstyle-cachefile
          key:  ${{ runner.os }}-checkstyle
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle (Fail on violations)
        run: mvn checkstyle:check -B

  pmd:
    name: PMD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache PMD cache-file
        id: cache-pmd
        uses: actions/cache@v6
        with:
          path: target/pmd/pmd.cache
          key: ${{ runner.os }}-pmd
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run PMD (Fail on violations)
        run: mvn pmd:check -B

  # SpotBugs bytecode analysis (+ find-sec-bugs). Moved here off the `build`
  # critical path: pom.xml binds spotbugs:check to `verify` so a local
  # `./mvnw verify` runs it, but CI's build job skips it (-Dspotbugs.skip=true)
  # and this parallel job enforces it instead. Unlike the source-based Checkstyle
  # and PMD jobs, SpotBugs needs compiled bytecode, so this runs `compile` first
  # (includeTests defaults to false → main classes only).
  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run SpotBugs (Fail on violations)
        run: mvn -B compile spotbugs:check

  # Spotless (Palantir Java Format) format gate. Moved here off the `build`
  # critical path: pom.xml still binds spotless:check to `compile` so a local
  # `./mvnw verify` runs it, but CI's build job skips it (-Dspotless.check.skip)
  # and this parallel job enforces it instead.
  spotless:
    name: Spotless
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Job-owned Maven cache. Spotless resolves the Palantir formatter
      # (palantir-java-format + google-java-format + transitive) at goal-execution
      # time; those artifacts are NOT in the shared setup-java `cache: maven` (no
      # other job uses the formatter, so they never get saved there), which made
      # this job re-download them from Maven Central every run (~24s, silent under
      # -B). A dedicated key this job can save persists the formatter across runs.
      - name: Cache Maven repository (incl. Spotless formatter)
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-spotless-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-spotless-
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Run Spotless (Fail on violations)
        run: mvn spotless:check -B

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run oxlint (fast gate, fail on violations)
        run: npm run lint:oxlint
      - name: Run ESLint + Prettier + type-check (Fail on violations)
        run: npm run lint
