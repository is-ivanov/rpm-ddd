name: Run Code Quality Tools

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "code-quality-config/**"
      - "frontend/**"
      - ".github/workflows/code-quality.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "code-quality-config/**"
      - "frontend/**"
      - ".github/workflows/code-quality.yml"

jobs:

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Checkstyle cache-file
        id: cache-checkstyle
        uses: actions/cache@v5
        with:
          path: target/checkstyle-cachefile
          key:  ${{ runner.os }}-checkstyle
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle (Fail on violations)
        run: mvn checkstyle:check -B

  pmd:
    name: PMD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache PMD cache-file
        id: cache-pmd
        uses: actions/cache@v5
        with:
          path: target/pmd/pmd.cache
          key: ${{ runner.os }}-pmd
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run PMD (Fail on violations)
        run: mvn pmd:check -B

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint + Prettier (Fail on violations)
        run: npm run lint
