name: Check for Checkstyle Google Style Updates

on:
  schedule:
    # Run at 09:00 UTC on the 1st day of every month
    - cron: '0 9 1 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-google-style-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest google_checks.xml from upstream
        run: |
          curl -sL https://raw.githubusercontent.com/checkstyle/checkstyle/master/src/main/resources/google_checks.xml \
            -o /tmp/google_checks_upstream.xml

      - name: Compare with local copy
        id: diff
        run: |
          LOCAL_FILE="code-quality-config/checkstyle/google_checks.xml"

          if [ ! -f "$LOCAL_FILE" ]; then
            echo "Local google_checks.xml not found!"
            exit 1
          fi

          DIFF_OUTPUT=$(diff -u "$LOCAL_FILE" /tmp/google_checks_upstream.xml || true)

          if [ -z "$DIFF_OUTPUT" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in upstream google_checks.xml"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            # Copy upstream version to replace local file
            cp /tmp/google_checks_upstream.xml "$LOCAL_FILE"

            echo "Changes detected and local file updated with upstream version"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update google_checks.xml from upstream checkstyle

            Synced from checkstyle/checkstyle master branch
          branch: chore/update-google-checks
          branch-suffix: timestamp
          delete-branch: true
          title: 'chore: update google_checks.xml from upstream checkstyle'
          body: |
            ## Upstream Checkstyle Update

            The `google_checks.xml` has been updated from the upstream [checkstyle/checkstyle](https://github.com/checkstyle/checkstyle/blob/master/src/main/resources/google_checks.xml) repository.

            ### Changes

            See the "Files changed" tab in this PR for the full diff.

            ### Action Items

            - [ ] Review the diff in the "Files changed" tab
            - [ ] Merge this PR to update `code-quality-config/checkstyle/google_checks.xml`
            - [ ] If needed, apply relevant changes to `code-quality-config/checkstyle/my_checks.xml`
            - [ ] Run `./mvnw checkstyle:check -B` to verify

            ---
            *This PR was created automatically by the checkstyle-updates workflow.*
          labels: |
            checkstyle-update
            maintenance
          reviewers: is-ivanov
