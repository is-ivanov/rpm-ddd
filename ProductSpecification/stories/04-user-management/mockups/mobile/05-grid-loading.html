<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>RPM — Users (loading)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa; --bg-white: #ffffff;
            --text-primary: #212529; --text-secondary: #6c757d;
            --border: #dee2e6; --accent: #228be6; --accent-light: #e7f5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .topbar { height: 56px; background: var(--bg-white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 8px; }
        .icon-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
        .icon-btn i { width: 24px; height: 24px; }
        .topbar-title { font-size: 16px; font-weight: 600; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
        .avatar-wrap { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .loader-wrap { display: flex; align-items: center; justify-content: center; height: calc(100vh - 56px); }
        .spinner { width: 32px; height: 32px; color: var(--accent); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="topbar">
        <button class="icon-btn"><i data-lucide="menu"></i></button>
        <div class="topbar-title">Users</div>
        <div class="avatar-wrap"><div class="avatar">JD</div></div>
    </header>
    <main class="loader-wrap"><i data-lucide="loader-2" class="spinner"></i></main>
    <script>lucide.createIcons();</script>
</body>
</html>
