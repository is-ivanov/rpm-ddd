<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>RPM — Создать пользователя (ошибки)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa; --bg-white: #ffffff;
            --text-primary: #212529; --text-secondary: #6c757d; --text-placeholder: #adb5bd;
            --border: #dee2e6; --border-focus: #4dabf7;
            --accent: #228be6; --accent-hover: #1c7ed6;
            --danger: #fa5252; --danger-bg: #fff5f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-white); color: var(--text-primary);
            display: flex; flex-direction: column; min-height: 100vh; }
        .sheet-head { height: 56px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 8px 0 16px; border-bottom: 1px solid var(--border); }
        .sheet-title { font-size: 16px; font-weight: 600; }
        .icon-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
        .icon-btn i { width: 24px; height: 24px; }
        .form { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 14px; font-weight: 500; }
        .field .optional { color: var(--text-secondary); font-weight: 400; }
        .field input { height: 44px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px;
            font-family: inherit; font-size: 14px; }
        .field input:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(77,171,247,0.2); }
        .field.error input { border-color: var(--danger); }
        .field .err-msg { font-size: 13px; color: var(--danger); }
        .foot { padding: 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .btn-primary { height: 44px; background: var(--accent); color: #fff; border: none; border-radius: 6px;
            font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; }
        .btn-secondary { height: 44px; background: transparent; color: var(--text-primary); border: 1px solid var(--border);
            border-radius: 6px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; }
    </style>
</head>
<body>
    <header class="sheet-head">
        <div class="sheet-title">Новый пользователь</div>
        <button class="icon-btn"><i data-lucide="x"></i></button>
    </header>
    <main class="form">
        <div class="field">
            <label>Имя</label>
            <input value="Анна">
        </div>
        <div class="field">
            <label>Отчество <span class="optional">— необязательно</span></label>
            <input value="Сергеевна">
        </div>
        <div class="field error">
            <label>Фамилия</label>
            <input value="">
            <span class="err-msg">Укажите фамилию</span>
        </div>
        <div class="field error">
            <label>Логин</label>
            <input value="a.volkova">
            <span class="err-msg">Этот логин уже занят</span>
        </div>
        <div class="field error">
            <label>Email</label>
            <input value="a.volkova@rpm.local">
            <span class="err-msg">Этот email уже используется</span>
        </div>
    </main>
    <footer class="foot">
        <button class="btn-primary">Создать</button>
        <button class="btn-secondary">Отмена</button>
    </footer>
    <script>lucide.createIcons();</script>
</body>
</html>
