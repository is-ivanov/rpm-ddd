<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>RPM — Пользователи (пусто)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa; --bg-white: #ffffff;
            --text-primary: #212529; --text-secondary: #6c757d; --text-placeholder: #adb5bd;
            --border: #dee2e6; --accent: #228be6; --accent-hover: #1c7ed6; --accent-light: #e7f5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .topbar { height: 56px; background: var(--bg-white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 8px; }
        .icon-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
        .icon-btn i { width: 24px; height: 24px; }
        .topbar-title { font-size: 16px; font-weight: 600; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
        .avatar-wrap { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; gap: 12px; height: calc(100vh - 56px); padding: 0 24px; }
        .empty-state .empty-icon { width: 48px; height: 48px; color: var(--text-placeholder); }
        .empty-state .empty-title { font-size: 18px; font-weight: 600; }
        .empty-state .empty-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 44px;
            padding: 0 20px; margin-top: 8px; background: var(--accent); color: #fff; border: none; border-radius: 6px;
            font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; }
        .btn-primary i { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <header class="topbar">
        <button class="icon-btn"><i data-lucide="menu"></i></button>
        <div class="topbar-title">Пользователи</div>
        <div class="avatar-wrap"><div class="avatar">ИП</div></div>
    </header>
    <main class="empty-state">
        <i data-lucide="users" class="empty-icon"></i>
        <div class="empty-title">Пока нет пользователей</div>
        <p class="empty-desc">Создайте первого пользователя — ему придёт письмо для активации и установки пароля.</p>
        <button class="btn-primary"><i data-lucide="plus"></i> Создать пользователя</button>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
