<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <title>RPM — Пользователи (загрузка)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa; --bg-white: #ffffff;
            --bg-sidebar: #1a1d23; --bg-sidebar-active: #3b4252;
            --bg-column: #f1f3f5;
            --text-primary: #212529; --text-secondary: #6c757d;
            --text-sidebar: #adb5bd; --text-sidebar-active: #ffffff;
            --border: #dee2e6; --accent: #228be6; --accent-light: #e7f5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        .topbar { height: 56px; background: var(--bg-white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .icon-btn i { width: 20px; height: 20px; }
        .topbar-logo { font-size: 20px; font-weight: 700; color: var(--accent); }
        .user-menu { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-light); color: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-menu > i { width: 16px; height: 16px; color: var(--text-secondary); }
        .layout { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 240px; background: var(--bg-sidebar); flex-shrink: 0; padding: 16px 0; }
        .nav-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
            color: var(--text-sidebar); opacity: 0.6; padding: 16px 24px 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; font-size: 14px; font-weight: 500;
            color: var(--text-sidebar); text-decoration: none; border-left: 3px solid transparent; }
        .nav-item.active { background: var(--bg-sidebar-active); color: var(--text-sidebar-active); border-left-color: var(--accent); }
        .nav-item.sub { padding-left: 32px; }
        .nav-item i { width: 20px; height: 20px; }
        .content { flex: 1; padding: 32px; }
        .content-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .page-title { font-size: 24px; font-weight: 700; }
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px;
            background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 500;
            font-family: inherit; cursor: pointer; }
        .loader-wrap { display: flex; align-items: center; justify-content: center; height: 360px; }
        .spinner { width: 32px; height: 32px; color: var(--accent); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <button class="icon-btn"><i data-lucide="panel-left"></i></button>
            <div class="topbar-logo">RPM</div>
        </div>
        <div class="user-menu">
            <div class="avatar">ИП</div><span class="user-name">Иван Петров</span><i data-lucide="chevron-down"></i>
        </div>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <a class="nav-item"><i data-lucide="layout-dashboard"></i> Главная</a>
            <div class="nav-group-label">Администрирование</div>
            <a class="nav-item sub active"><i data-lucide="users"></i> Пользователи</a>
        </aside>
        <main class="content">
            <div class="content-head">
                <h1 class="page-title">Пользователи</h1>
                <button class="btn-primary"><i data-lucide="plus"></i> Создать пользователя</button>
            </div>
            <div class="loader-wrap"><i data-lucide="loader-2" class="spinner"></i></div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
