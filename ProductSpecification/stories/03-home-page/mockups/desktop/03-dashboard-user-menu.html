<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <title>RPM — Home (user menu)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-white: #ffffff;
            --bg-sidebar: #1a1d23;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-sidebar: #adb5bd;
            --text-placeholder: #adb5bd;
            --border: #dee2e6;
            --accent: #228be6;
            --accent-light: #e7f5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); }

        .topbar {
            height: 56px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .topbar-logo { font-size: 20px; font-weight: 700; color: var(--accent); }

        .user-menu-wrap { position: relative; }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            background: var(--bg-primary);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .user-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .user-menu i { width: 16px; height: 16px; color: var(--text-secondary); }

        /* Dropdown */
        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 220px;
            background: var(--bg-white);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .dropdown-header { padding: 12px; }
        .dropdown-header .dh-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .dropdown-header .dh-email { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .dropdown-divider { height: 1px; background: var(--border); }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 40px;
            padding: 0 12px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .dropdown-item:hover { background: var(--bg-primary); }
        .dropdown-item i { width: 18px; height: 18px; color: var(--text-secondary); }

        .layout { display: flex; min-height: calc(100vh - 56px); }

        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .sidebar-placeholder {
            font-size: 13px;
            color: var(--text-sidebar);
            opacity: 0.5;
            text-align: center;
            line-height: 1.5;
        }

        .content { flex: 1; padding: 32px; display: flex; flex-direction: column; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--text-primary); }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
        }

        .empty-state .empty-icon { width: 48px; height: 48px; color: var(--text-placeholder); }
        .empty-state .empty-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .empty-state .empty-desc { font-size: 14px; color: var(--text-secondary); max-width: 360px; line-height: 1.5; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-logo">RPM</div>
        <div class="user-menu-wrap">
            <div class="user-menu">
                <div class="avatar">JD</div>
                <span class="user-name">John Doe</span>
                <i data-lucide="chevron-up"></i>
            </div>
            <div class="dropdown">
                <div class="dropdown-header">
                    <div class="dh-name">John Doe</div>
                    <div class="dh-email">j.doe@rpm.local</div>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item">
                    <i data-lucide="log-out"></i>
                    Log out
                </div>
            </div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-placeholder">Sections will appear<br>as modules are connected</div>
        </aside>

        <main class="content">
            <h1 class="page-title">Home</h1>
            <div class="empty-state">
                <i data-lucide="layout-dashboard" class="empty-icon"></i>
                <div class="empty-title">Dashboard</div>
                <p class="empty-desc">Patient, order, and alert data will appear here as modules are connected.</p>
            </div>
        </main>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
