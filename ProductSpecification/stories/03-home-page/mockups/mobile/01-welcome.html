<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>RPM — Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: #228be6;
            --accent-hover: #1c7ed6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .welcome { text-align: center; width: 100%; }

        .welcome-logo {
            font-size: 40px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .welcome-tagline {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 8px;
        }

        .welcome-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 16px;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 44px;
            margin-top: 28px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary i { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="welcome">
        <div class="welcome-logo">RPM</div>
        <div class="welcome-tagline">Remote Patient Monitoring</div>
        <p class="welcome-text">
            A platform for continuous monitoring of patient health
            with automatic alerts on abnormal readings.
        </p>
        <a href="#" class="btn-primary">
            <i data-lucide="log-in"></i>
            Sign in
        </a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
