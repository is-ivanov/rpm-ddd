<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <title>RPM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-white: #ffffff;
            --bg-sidebar: #1a1d23;
            --bg-sidebar-hover: #2d3139;
            --bg-sidebar-active: #3b4252;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-sidebar: #adb5bd;
            --text-sidebar-active: #ffffff;
            --border: #dee2e6;
            --accent: #228be6;
            --accent-light: #e7f5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); }

        /* Top bar: logo left, user menu right (spans full width above sidebar + content) */
        .topbar {
            height: 56px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .topbar-logo { font-size: 20px; font-weight: 700; color: var(--accent); }

        .user-menu-wrap { position: relative; }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .user-menu:hover { background: var(--bg-primary); }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .user-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .user-menu > i { width: 16px; height: 16px; color: var(--text-secondary); }

        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 220px;
            background: var(--bg-white);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .dropdown-header { padding: 12px; }
        .dropdown-header .dh-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .dropdown-header .dh-email { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .dropdown-divider { height: 1px; background: var(--border); }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 40px;
            padding: 0 12px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .dropdown-item:hover { background: var(--bg-primary); }
        .dropdown-item i { width: 18px; height: 18px; color: var(--text-secondary); }

        /* Body: sidebar + content */
        .layout { display: flex; min-height: calc(100vh - 56px); }

        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            flex-shrink: 0;
            padding: 16px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sidebar);
            text-decoration: none;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .nav-item:hover { background: var(--bg-sidebar-hover); }

        .nav-item.active {
            background: var(--bg-sidebar-active);
            color: var(--text-sidebar-active);
            border-left-color: var(--accent);
        }

        .nav-item i { width: 20px; height: 20px; }

        .content { flex: 1; padding: 32px; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    </style>
</head>
<body>
    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-logo">RPM</div>
        <div class="user-menu-wrap">
            <div class="user-menu">
                <div class="avatar">JD</div>
                <span class="user-name">John Doe</span>
                <i data-lucide="chevron-down"></i>
            </div>
            <!-- Toggle on click. Dropdown markup:
            <div class="dropdown">
                <div class="dropdown-header">
                    <div class="dh-name">John Doe</div>
                    <div class="dh-email">j.doe@rpm.local</div>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item"><i data-lucide="log-out"></i> Sign out</div>
            </div>
            -->
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar nav (Story 3 renders this empty; later stories add nav items) -->
        <aside class="sidebar">
            <a class="nav-item active"><i data-lucide="layout-dashboard"></i> Home</a>
            <!-- <a class="nav-item"><i data-lucide="users"></i> Patients</a> -->
        </aside>

        <!-- Main content area -->
        <main class="content">
            <h1 class="page-title">Home</h1>
            <!-- Page content here -->
        </main>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
