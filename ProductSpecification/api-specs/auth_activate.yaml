openapi: 3.0.3
info:
  title: Auth Activation
  version: 1.0.0

paths:
  /api/auth/activate:
    get:
      summary: Validate activation token and return user info
      operationId: getActivationInfo
      tags:
        - auth
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT activation token
      responses:
        '200':
          description: Token valid, user info returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationInfoResponse'
        '422':
          description: Invalid or expired token (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '500':
          description: Internal server error

    post:
      summary: Set password and activate account
      operationId: activateAccount
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateRequest'
      responses:
        '200':
          description: Account activated successfully
        '422':
          description: Invalid token, expired token, or password policy violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '500':
          description: Internal server error

components:
  schemas:
    ActivationInfoResponse:
      type: object
      properties:
        login:
          type: string
          description: User login
        email:
          type: string
          description: User email address

    ActivateRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: JWT activation token
        newPassword:
          type: string
          description: New password (12-128 chars, upper, lower, digit, special, no whitespace)
          minLength: 12
          maxLength: 128

    ProblemDetailResponse:
      type: object
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          description: URI reference to the error type
        title:
          type: string
          description: Short human-readable summary
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Specific explanation of the error
        instance:
          type: string
          description: URI reference to the specific occurrence
        fieldErrors:
          type: array
          description: Per-field validation details (present for validation errors)
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        code:
          type: string
        property:
          type: string
        message:
          type: string
        rejectedValue:
          type: string
        path:
          type: string
