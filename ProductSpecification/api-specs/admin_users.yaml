openapi: 3.0.3
info:
  title: Admin Users
  version: 1.0.0

paths:
  /api/admin/users:
    get:
      summary: List all users for the admin grid
      description: >
        Returns the full user list in a deterministic default order
        (createdAt DESC, userId DESC — newest first; userId is a UUIDv7 tiebreaker
        guaranteeing a total order). The frontend re-sorts/filters client-side.
      operationId: listUsers
      tags:
        - admin-users
      responses:
        '200':
          description: Full user list with resolved actor names
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetailResponse'
        '500':
          description: Internal server error

    post:
      summary: Register a new user (PENDING + activation email)
      operationId: registerUser
      tags:
        - admin-users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User created; Location header points to the new user
          headers:
            Location:
              schema:
                type: string
              description: URI of the created user
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetailResponse'
        '422':
          description: Validation error (e.g. duplicate login/email) with per-field details
          content:
            application/problem+json:
              schema:
                $ref: './common.yaml#/components/schemas/ValidationProblemDetailResponse'
        '500':
          description: Internal server error

components:
  schemas:
    UserSummaryResponse:
      type: object
      description: >
        A user as shown in the admin user list: a summary projection. The list endpoint
        returns a bare JSON array of these (no envelope). The full single-user view will be
        exposed separately as UserDetailResponse on GET /api/admin/users/{id}.
      required:
        - userId
        - name
        - login
        - email
        - status
        - audit
      properties:
        userId:
          type: string
          format: uuid
          description: User unique identifier
        name:
          $ref: './common.yaml#/components/schemas/PersonNameResponse'
        login:
          type: string
        email:
          type: string
        status:
          type: string
          enum: [PENDING, ACTIVE, LOCKED, INACTIVE]
          description: >
            Canonical lifecycle order (PENDING → ACTIVE → LOCKED → INACTIVE).
            The Status filter lists options and the Status-column sort ranks
            by this lifecycle order (the enum ordinal), NOT alphabetically.
        audit:
          $ref: './common.yaml#/components/schemas/AuditResponse'

    RegisterUserRequest:
      type: object
      required:
        - firstName
        - lastName
        - login
        - email
        - timeZone
      properties:
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
          maxLength: 255
        lastName:
          type: string
        login:
          type: string
          description: Unique; duplicate → 422 field error
        email:
          type: string
          format: email
          description: Unique; duplicate → 422 field error
        timeZone:
          type: string
          description: IANA zone id (e.g. Europe/Berlin); pre-filled with the app default
