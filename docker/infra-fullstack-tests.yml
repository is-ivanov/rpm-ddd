# Full-stack E2E test infrastructure (Postgres + Mailpit).
# Mirrors infra-tests.yml but adds Mailpit for the account-lifecycle journey
# (activation email read by the test). Distinct host ports so it can coexist
# with Infra-Tests-Up. Data lives on tmpfs (does not survive container restart).
# Start is idempotent; leave running across runs (shared-first), never torn down.

name: rpm-ddd-fullstack-tests

services:
  postgres:
    image: ${POSTGRES_TEST_IMAGE}
    container_name: rpm-ddd-fullstack-tests
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rpm_ddd
      PGDATA: /tmp/pgdata
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS}
      -c work_mem=${POSTGRES_WORK_MEM}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM}
      -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE}
      -c autovacuum=${POSTGRES_AUTOVACUUM}
      -c fsync=${POSTGRES_FSYNC}
      -c full_page_writes=${POSTGRES_FULL_PAGE_WRITES}
      -c synchronous_commit=${POSTGRES_SYNCHRONOUS_COMMIT}
      -c wal_level=${POSTGRES_WAL_LEVEL}
      -c max_wal_senders=${POSTGRES_MAX_WAL_SENDERS}
      -c archive_mode=${POSTGRES_ARCHIVE_MODE}
      -c ssl=${POSTGRES_SSL}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS}
      -c max_parallel_workers=${POSTGRES_MAX_PARALLEL_WORKERS}
      -c checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT}
    tmpfs:
      - /tmp
    ports:
      - "54035:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.21.8
    container_name: rpm-ddd-fullstack-mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "1025:1025"
      - "8025:8025"
