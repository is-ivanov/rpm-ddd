# ===================================================================
# Spring Boot configuration.
#
# This configuration will be overridden by the Spring profile you use,
# for example application-dev.yml if you use the "dev" profile.
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# https://docs.spring.io/spring-boot/appendix/application-properties/index.html
# ===================================================================
spring:
  datasource:
    hikari:
      # Fail-fast DB timeouts (Task 214). A stalled Supabase-pooler handshake must fail
      # fast and let Render auto-retry instead of hanging the main startup thread ~13 min.
      connection-timeout: 10000
      validation-timeout: 5000
      initialization-fail-timeout: 10000
      data-source-properties:
        # PostgreSQL JDBC driver timeouts (seconds) carried into the connection.
        socketTimeout: 30
        connectTimeout: 10
        loginTimeout: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: off
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
  modulith:
    events:
      completion-mode: archive

logging:
  level:
    io.github.wimdeblauwe.errorhandlingspringbootstarter.ProblemDetailFactory: warn
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: error

# ===================================================================
# Actuator (management) properties.
# Expose the info and health endpoints over the web. info surfaces the deployed
# build version, git commit, and build time (Task 215). health is the Render
# deploy health check probe path (Task 214) and is the only PUBLIC actuator
# endpoint. Other endpoints (env, beans) stay closed. Security permits
# authenticated GET /actuator/info, anonymous GET /actuator/health, and denies
# the rest of /actuator/**.
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: info, health
  endpoint:
    health:
      # Render uses a single HTTP health-check path, not Kubernetes liveness/readiness
      # probes, so keep the public payload the canonical {"status":"UP"}.
      probes:
        enabled: false
  health:
    # A flaky SMTP server must NOT fail the Render deploy health check: the app is
    # alive (and DB-connected) even when mail delivery is temporarily unavailable.
    mail:
      enabled: false
  info:
    git:
      mode: simple
    build:
      enabled: true

# ===================================================================
# Error handling application properties.
# Full reference is available at:
# https://wimdeblauwe.github.io/error-handling-spring-boot-starter/current/#properties
# ===================================================================
error:
  handling:
    use-problem-detail-format: true
    problem-detail-type-prefix: https://www.rpm-ddd.my/problem/
    http-statuses:
      org.springframework.security.authentication.BadCredentialsException: unauthorized
      org.springframework.security.authentication.InternalAuthenticationServiceException: unauthorized
      by.iivanov.rpm.iam.user.domain.UserAuthenticationException: unauthorized
      by.iivanov.rpm.iam.user.domain.TooManyLoginAttemptsException: too-many-requests
      org.springframework.web.bind.MethodArgumentNotValidException: unprocessable-content
      io.jsonwebtoken.ExpiredJwtException: unprocessable-content
      io.jsonwebtoken.MalformedJwtException: unprocessable-content
      io.jsonwebtoken.security.SignatureException: unprocessable-content
    codes:
      by.iivanov.rpm.iam.user.domain.UserAuthenticationException: authentication-failed
      by.iivanov.rpm.iam.user.domain.TooManyLoginAttemptsException: too-many-login-attempts
    messages:
      io.jsonwebtoken.security.SignatureException: "Invalid activation token"
      io.jsonwebtoken.ExpiredJwtException: "Activation token has expired"


# ===================================================================
# Specific application properties.
# ===================================================================
rpm:
  frontend-base-url: https://rpm-platform.com
  events:
    resubmit:
      interval: 5s
  mail:
    from-name: "RPM Platform"
    from-address: "no-reply@rpm-platform.com"
  iam:
    activation:
      jwt:
        secret: Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3JldC1rZXktaW4tcHJvZHVjdGlvbg==
        expiration: 24h
